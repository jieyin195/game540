<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="screen-orientation" content="landscape">
<title>540 打牌</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

canvas { display: block; width: 100%; height: 100%; touch-action: none; }
#rotate-hint {
  display: none;
  position: fixed; inset: 0;
  background: #1a3a1a; color: #ffd700;
  font-size: 28px; z-index: 999;
  justify-content: center; align-items: center;
}
@media (orientation: portrait) {
  #rotate-hint { display: flex; }
  canvas { display: none; }
}
</style>
</head>
<body>
<div id="rotate-hint">请横屏游玩</div>
<canvas id="game"></canvas>
<script>
(function() {
// =========================================================================
// card.js
// =========================================================================

/**
 * card.js - 540打牌游戏牌组定义
 * 126张牌：4副牌去掉4,6,7,8,9（保留2张3）
 *
 * Translated from game_540/card.py (Python → ES module JS)
 */

// ---------------------------------------------------------------------------
// Suit constants
// ---------------------------------------------------------------------------
const SUIT_SPADES   = 'spades';
const SUIT_HEARTS   = 'hearts';
const SUIT_CLUBS    = 'clubs';
const SUIT_DIAMONDS = 'diamonds';
const SUIT_SPECIAL  = 'special';

const SUITS = [SUIT_SPADES, SUIT_HEARTS, SUIT_CLUBS, SUIT_DIAMONDS];

const SUIT_DISPLAY = {
    [SUIT_SPADES]:   '♠',
    [SUIT_HEARTS]:   '♥',
    [SUIT_CLUBS]:    '♣',
    [SUIT_DIAMONDS]: '♦',
    [SUIT_SPECIAL]:  '',
};

const SUIT_COLOR = {
    [SUIT_SPADES]:   'black',
    [SUIT_HEARTS]:   'red',
    [SUIT_CLUBS]:    'black',
    [SUIT_DIAMONDS]: 'red',
    [SUIT_SPECIAL]:  'black',
};

// ---------------------------------------------------------------------------
// Rank constants
// ---------------------------------------------------------------------------
const REGULAR_RANKS = ['A', '2', '5', '10', 'J', 'Q', 'K'];

const RANK_SMALL_JOKER = 'small_joker';
const RANK_BIG_JOKER   = 'big_joker';
const RANK_CHARACTER   = 'character';
const RANK_THREE       = '3';

const SPECIAL_RANKS = [RANK_SMALL_JOKER, RANK_BIG_JOKER, RANK_CHARACTER];

const RANK_DISPLAY = {
    'A':  'A',
    '2':  '2',
    '3':  '3',
    '5':  '5',
    '10': '10',
    'J':  'J',
    'Q':  'Q',
    'K':  'K',
    [RANK_SMALL_JOKER]: '小王',
    [RANK_BIG_JOKER]:   '大王',
    [RANK_CHARACTER]:   '字牌',
};

const REGULAR_RANK_ORDER = {
    '5':  5,
    'J':  11,
    'Q':  12,
    'K':  13,
    'A':  14,
    '2':  2,
    '10': 10,
};

// ---------------------------------------------------------------------------
// Card class
// ---------------------------------------------------------------------------
class Card {
    /**
     * @param {string} suit - One of the SUIT_* constants
     * @param {string} rank - One of the REGULAR_RANKS, RANK_THREE, or SPECIAL_RANKS
     */
    constructor(suit, rank) {
        this.suit      = suit;
        this.rank      = rank;
        this.playOrder = 0;   // camelCase equivalent of play_order
    }

    /**
     * Returns the point value of this card (0, 5, or 10).
     * @returns {number}
     */
    scoreValue() {
        if (this.rank === '5') return 5;
        if (
            this.rank === '10'           ||
            this.rank === 'K'            ||
            this.rank === RANK_SMALL_JOKER ||
            this.rank === RANK_BIG_JOKER   ||
            this.rank === RANK_CHARACTER   ||
            this.rank === RANK_THREE
        ) return 10;
        return 0;
    }

    /**
     * Returns true if this card belongs to the special suit (jokers, character, 3).
     * @returns {boolean}
     */
    isSpecial() {
        return this.suit === SUIT_SPECIAL;
    }

    /**
     * Returns the display string for this card (e.g. "♠A", "大王").
     * @returns {string}
     */
    displayName() {
        if (this.suit === SUIT_SPECIAL) {
            return RANK_DISPLAY[this.rank] ?? this.rank;
        }
        const suitSym = SUIT_DISPLAY[this.suit] ?? this.suit;
        const rankSym = RANK_DISPLAY[this.rank] ?? this.rank;
        return `${suitSym}${rankSym}`;
    }

    /**
     * Value equality — two cards are equal if suit and rank match.
     * @param {Card} other
     * @returns {boolean}
     */
    equals(other) {
        if (!(other instanceof Card)) return false;
        return this.suit === other.suit && this.rank === other.rank;
    }

    /**
     * String representation (useful for debugging).
     * @returns {string}
     */
    toString() {
        return this.displayName();
    }
}

// ---------------------------------------------------------------------------
// Deck helpers
// ---------------------------------------------------------------------------

/**
 * Fisher-Yates in-place shuffle.
 * @param {Array} arr - Array to shuffle (mutated in place)
 * @returns {Array} The same array, shuffled
 */
function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

/**
 * Builds a fresh 126-card deck (unshuffled).
 * 4 copies of each regular suit × regular rank,
 * 4 copies of each special rank (small joker, big joker, character),
 * plus 2 extra threes (♠3).
 * @returns {Card[]}
 */
function buildDeck() {
    const deck = [];

    for (let copy = 0; copy < 4; copy++) {
        for (const suit of SUITS) {
            for (const rank of REGULAR_RANKS) {
                deck.push(new Card(suit, rank));
            }
        }
        for (const rank of SPECIAL_RANKS) {
            deck.push(new Card(SUIT_SPECIAL, rank));
        }
    }

    // Two extra ♠3 cards
    deck.push(new Card(SUIT_SPADES, RANK_THREE));
    deck.push(new Card(SUIT_SPADES, RANK_THREE));

    if (deck.length !== 126) {
        throw new Error(`Expected 126 cards, got ${deck.length}`);
    }
    return deck;
}

/**
 * Shuffles a copy of deck and deals it into three hands of 42 cards each.
 * @param {Card[]} deck - The full 126-card deck
 * @returns {[Card[], Card[], Card[]]} Three hands: [hand0, hand1, hand2]
 */
function shuffleAndDeal(deck) {
    const shuffled = shuffleArray([...deck]);
    return [
        shuffled.slice(0, 42),
        shuffled.slice(42, 84),
        shuffled.slice(84, 126),
    ];
}

/**
 * Sums the score values of an array of cards.
 * @param {Card[]} cards
 * @returns {number}
 */
function totalScore(cards) {
    return cards.reduce((sum, c) => sum + c.scoreValue(), 0);
}

// =========================================================================
// rules.js
// =========================================================================

/**
 * rules.js - 540打牌游戏规则引擎
 *
 * Translated from game_540/rules.py (Python → ES module JS)
 */

    Card, SUITS, SUIT_SPECIAL,
    RANK_SMALL_JOKER, RANK_BIG_JOKER, RANK_CHARACTER, RANK_THREE,
    REGULAR_RANK_ORDER, SUIT_SPADES, SUIT_HEARTS, SUIT_CLUBS, SUIT_DIAMONDS,
} from './card.js';

// ---------------------------------------------------------------------------
// Suit priority (used for trump calling tie-breaks)
// ---------------------------------------------------------------------------
const SUIT_PRIORITY = {
    [SUIT_SPADES]:   4,
    [SUIT_HEARTS]:   3,
    [SUIT_CLUBS]:    2,
    [SUIT_DIAMONDS]: 1,
};

// ---------------------------------------------------------------------------
// Trump helpers
// ---------------------------------------------------------------------------

/**
 * Returns true if the card is a trump card given the current trump suit.
 * @param {Card} card
 * @param {string|null} trumpSuit
 * @returns {boolean}
 */
function isTrump(card, trumpSuit) {
    if (card.rank === RANK_THREE || card.rank === RANK_CHARACTER ||
        card.rank === RANK_BIG_JOKER || card.rank === RANK_SMALL_JOKER) return true;
    if (card.rank === '10' || card.rank === '2') return true;
    if (trumpSuit && card.suit === trumpSuit) return true;
    return false;
}

/**
 * Returns the logical suit of a card ('trump' or the card's actual suit).
 * @param {Card} card
 * @param {string|null} trumpSuit
 * @returns {string}
 */
function getSuitOfCard(card, trumpSuit) {
    if (isTrump(card, trumpSuit)) return 'trump';
    return card.suit;
}

/**
 * Returns a numeric power value for a card (higher = stronger).
 * @param {Card} card
 * @param {string|null} trumpSuit
 * @param {number} [playOrder=0]
 * @returns {number}
 */
function cardPower(card, trumpSuit, playOrder = 0) {
    const rank = card.rank;
    const suit = card.suit;

    if (rank === RANK_THREE)      return 10000;
    if (rank === RANK_CHARACTER)  return 9900;
    if (rank === RANK_BIG_JOKER)  return 9800;
    if (rank === RANK_SMALL_JOKER) return 9700;

    if (trumpSuit === null || trumpSuit === undefined) {
        if (rank === '10') return 9500 - playOrder;
        if (rank === '2')  return 9400 - playOrder;
        const suitIdx = SUITS.includes(suit) ? SUITS.indexOf(suit) : 0;
        const rankVal = REGULAR_RANK_ORDER[rank] ?? 0;
        return suitIdx * 100 + rankVal;
    } else {
        const isTrumpSuit = (suit === trumpSuit);
        if (rank === '10' && isTrumpSuit)  return 9600;
        if (rank === '10' && !isTrumpSuit) return 9500 - playOrder;
        if (rank === '2'  && isTrumpSuit)  return 9400;
        if (rank === '2'  && !isTrumpSuit) return 9300 - playOrder;
        if (suit === trumpSuit) {
            const rankVal = REGULAR_RANK_ORDER[rank] ?? 0;
            return 1000 + rankVal;
        }
        const suitIdx = SUITS.includes(suit) ? SUITS.indexOf(suit) : 0;
        const rankVal = REGULAR_RANK_ORDER[rank] ?? 0;
        return suitIdx * 100 + rankVal;
    }
}

/**
 * Returns the strongest card from a group.
 * @param {Card[]} cards
 * @param {string|null} trumpSuit
 * @returns {Card}
 */
function bestCardInGroup(cards, trumpSuit) {
    return cards.reduce((best, c) =>
        cardPower(c, trumpSuit, c.playOrder) > cardPower(best, trumpSuit, best.playOrder) ? c : best
    );
}

// ---------------------------------------------------------------------------
// Pair-grouping key
// ---------------------------------------------------------------------------

/**
 * Returns a grouping key for pairing purposes (handles cross-suit 10s and 2s).
 * Exported because ai.js uses it directly.
 * @param {Card} card
 * @param {string|null} trumpSuit
 * @returns {string}
 */
function pairKey(card, trumpSuit) {
    return `${card.suit}_${card.rank}`;
}

// ---------------------------------------------------------------------------
// Hand analysis helpers
// ---------------------------------------------------------------------------

/**
 * Counts occurrences of each display name in a card array.
 * @param {Card[]} cards
 * @returns {Map<string, number>}
 */
function countSame(cards) {
    const counter = new Map();
    for (const c of cards) {
        const name = c.displayName();
        counter.set(name, (counter.get(name) ?? 0) + 1);
    }
    return counter;
}

/**
 * Returns all pairs from a hand (as [Card, Card] arrays).
 * @param {Card[]} hand
 * @param {string|null} trumpSuit
 * @returns {Array<[Card, Card]>}
 */
function getPairs(hand, trumpSuit) {
    const groups = new Map();
    for (const card of hand) {
        const key = pairKey(card, trumpSuit);
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(card);
    }
    const pairs = [];
    for (const group of groups.values()) {
        if (group.length >= 2) pairs.push([group[0], group[1]]);
    }
    return pairs;
}

/**
 * Returns all triples from a hand (as Card[3] arrays).
 * @param {Card[]} hand
 * @param {string|null} trumpSuit
 * @returns {Array<Card[]>}
 */
function getTriples(hand, trumpSuit) {
    const groups = new Map();
    for (const card of hand) {
        const key = pairKey(card, trumpSuit);
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(card);
    }
    const triples = [];
    for (const group of groups.values()) {
        if (group.length >= 3) triples.push(group.slice(0, 3));
    }
    return triples;
}

/**
 * Returns all bombs (4-of-a-kind groups) from a hand.
 * @param {Card[]} hand
 * @param {string|null} trumpSuit
 * @returns {Array<Card[]>}
 */
function getBombs(hand, trumpSuit) {
    const groups = new Map();
    for (const card of hand) {
        const key = pairKey(card, trumpSuit);
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(card);
    }
    const bombs = [];
    for (const group of groups.values()) {
        if (group.length >= 4) bombs.push(group.slice(0, 4));
    }
    return bombs;
}

// ---------------------------------------------------------------------------
// Consecutive pairs / triples ordering
// ---------------------------------------------------------------------------

/**
 * Returns the ordering index of a pair within the trump sequence.
 * Higher = stronger. Returns -1 for non-consecutive pairs.
 * Exported because ai.js uses it.
 * @param {Array<Card>} pair - A [Card, Card] array
 * @param {string|null} trumpSuit
 * @returns {number}
 */
function trumpPairOrder(pair, trumpSuit) {
    const card = pair[0];
    const rank = card.rank;
    const suit = card.suit;

    if (trumpSuit === null || trumpSuit === undefined) {
        // 常主模式：只有 3>字牌>大王>小王 可构成连对
        // 规则：对小王与对10不是连对，对10与对2不是连对
        const orderMap = {
            [RANK_THREE]:      4,
            [RANK_CHARACTER]:  3,
            [RANK_BIG_JOKER]:  2,
            [RANK_SMALL_JOKER]: 1,
        };
        return orderMap[rank] ?? -1;
    } else {
        if (rank === RANK_THREE)      return 14;
        if (rank === RANK_CHARACTER)  return 13;
        if (rank === RANK_BIG_JOKER)  return 12;
        if (rank === RANK_SMALL_JOKER) return 11;
        if (rank === '10' && suit === trumpSuit) return 10;
        if (rank === '10') return 9;
        if (rank === '2'  && suit === trumpSuit) return 8;
        if (rank === '2') return 7;
        const regularOrder = { 'A': 6, 'K': 5, 'Q': 4, 'J': 3, '5': 2 };
        if (suit === trumpSuit) return regularOrder[rank] ?? -1;
        return -1;
    }
}

/**
 * Returns true if the given array of pairs forms a consecutive sequence.
 * @param {Array<Array<Card>>} pairs
 * @param {string|null} trumpSuit
 * @returns {boolean}
 */
function isConsecutivePairs(pairs, trumpSuit) {
    if (pairs.length < 2) return true;
    const orders = pairs.map(p => trumpPairOrder(p, trumpSuit)).sort((a, b) => a - b);
    if (orders.some(o => o < 0)) return false;
    for (let i = 1; i < orders.length; i++) {
        if (orders[i] - orders[i - 1] !== 1) return false;
    }
    return true;
}

/**
 * Returns true if the cards form a valid consecutive pairs play.
 * @param {Card[]} cards
 * @param {string|null} trumpSuit
 * @returns {boolean}
 */
function isValidConsecutivePairs(cards, trumpSuit) {
    if (cards.length < 4 || cards.length % 2 !== 0) return false;

    const groups = new Map();
    for (const c of cards) {
        const key = pairKey(c, trumpSuit);
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(c);
    }

    const pairGroups = [...groups.values()].filter(g => g.length >= 2);
    if (pairGroups.reduce((sum, g) => sum + 2, 0) !== cards.length) return false;

    const pairs = pairGroups.map(g => [g[0], g[1]]);
    return isConsecutivePairs(pairs, trumpSuit);
}

// ---------------------------------------------------------------------------
// Trump calling / counter
// ---------------------------------------------------------------------------

/**
 * Returns true if the given cards constitute a valid trump call.
 * @param {Card[]} cards
 * @returns {boolean}
 */
function canCallTrump(cards) {
    if (cards.length === 0) return false;
    if (cards.length === 1 && cards[0].rank === '10') return true;
    if (cards.length === 2) {
        const [c1, c2] = cards;
        if (c1.rank === c2.rank &&
            ['10', RANK_SMALL_JOKER, RANK_BIG_JOKER, RANK_CHARACTER, RANK_THREE].includes(c1.rank)) {
            if (c1.rank === '10' && c1.suit !== c2.suit) return false;
            return true;
        }
    }
    if (cards.length === 3) {
        const ranks = cards.map(c => c.rank);
        if (new Set(ranks).size === 1 &&
            ['10', RANK_SMALL_JOKER, RANK_BIG_JOKER, RANK_CHARACTER].includes(ranks[0])) {
            if (ranks[0] === '10' && new Set(cards.map(c => c.suit)).size !== 1) return false;
            return true;
        }
    }
    if (cards.length === 4) {
        const ranks = cards.map(c => c.rank);
        if (new Set(ranks).size === 1 &&
            ['10', RANK_SMALL_JOKER, RANK_BIG_JOKER, RANK_CHARACTER].includes(ranks[0])) {
            if (ranks[0] === '10' && new Set(cards.map(c => c.suit)).size !== 1) return false;
            return true;
        }
    }
    return false;
}

/**
 * Returns true if newCards can counter (override) the currentCall.
 * @param {Card[]} newCards
 * @param {Card[]} currentCall
 * @returns {boolean}
 */
function canCounterTrump(newCards, currentCall) {
    if (newCards.length < 2) return false;
    if (!canCallTrump(newCards)) return false;
    const newN = newCards.length;
    const curN = currentCall.length;
    if (newN > curN) return true;
    if (newN < curN) return false;

    const newRank = newCards[0].rank;
    const curRank = currentCall[0].rank;
    const rankPower = {
        '10': 1,
        [RANK_SMALL_JOKER]: 2,
        [RANK_BIG_JOKER]:   3,
        [RANK_CHARACTER]:   4,
        [RANK_THREE]:       5,
    };
    const newRp = rankPower[newRank] ?? 0;
    const curRp = rankPower[curRank] ?? 0;
    if (newRp > curRp) return true;
    if (newRp < curRp) return false;

    const newSuitP = SUIT_PRIORITY[newCards[0].suit] ?? 0;
    const curSuitP = SUIT_PRIORITY[currentCall[0].suit] ?? 0;
    return newSuitP > curSuitP;
}

// ---------------------------------------------------------------------------
// PlayType enum-like object
// ---------------------------------------------------------------------------

/**
 * Constants representing the type of a card play.
 */
const PlayType = Object.freeze({
    SINGLE:         'single',
    PAIR:           'pair',
    TRIPLE:         'triple',
    BOMB:           'bomb',
    CONSEC_PAIRS:   'consec_pairs',
    CONSEC_TRIPLES: 'consec_triples',
    INVALID:        'invalid',
});

// ---------------------------------------------------------------------------
// Play type detection
// ---------------------------------------------------------------------------

/**
 * Returns the PlayType of a set of cards played together.
 * @param {Card[]} cards
 * @param {string|null} trumpSuit
 * @returns {string} One of the PlayType constants
 */
function getPlayType(cards, trumpSuit) {
    const n = cards.length;
    if (n === 0) return PlayType.INVALID;
    if (n === 1) return PlayType.SINGLE;

    const groups = new Map();
    for (const c of cards) {
        const key = pairKey(c, trumpSuit);
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(c);
    }
    const counts = [...groups.values()].map(g => g.length).sort((a, b) => a - b);

    if (n === 2 && counts.length === 1 && counts[0] === 2) return PlayType.PAIR;
    if (n === 3 && counts.length === 1 && counts[0] === 3) return PlayType.TRIPLE;
    if (n === 4 && counts.length === 1 && counts[0] === 4) return PlayType.BOMB;

    if (n % 2 === 0 && [...groups.values()].every(g => g.length >= 2)) {
        const pairs = [...groups.values()].filter(g => g.length >= 2).map(g => [g[0], g[1]]);
        if (pairs.length === n / 2 && isConsecutivePairs(pairs, trumpSuit)) return PlayType.CONSEC_PAIRS;
    }

    if (n % 3 === 0 && [...groups.values()].every(g => g.length >= 3)) {
        const triplesPairs = [...groups.values()].filter(g => g.length >= 3).map(g => [g[0], g[1]]);
        if (triplesPairs.length === n / 3 && isConsecutivePairs(triplesPairs, trumpSuit)) return PlayType.CONSEC_TRIPLES;
    }

    return PlayType.INVALID;
}

// ---------------------------------------------------------------------------
// Suit following helpers
// ---------------------------------------------------------------------------

/**
 * Returns the suit that followers must match ('trump' or a regular suit).
 * @param {Card[]} ledCards
 * @param {string|null} trumpSuit
 * @returns {string}
 */
function getFollowSuit(ledCards, trumpSuit) {
    if (!ledCards || ledCards.length === 0) return 'trump';
    return getSuitOfCard(ledCards[0], trumpSuit);
}

/**
 * Filters a hand to only cards of the given logical suit.
 * @param {Card[]} hand
 * @param {string} suit
 * @param {string|null} trumpSuit
 * @returns {Card[]}
 */
function filterHandBySuit(hand, suit, trumpSuit) {
    return hand.filter(c => getSuitOfCard(c, trumpSuit) === suit);
}

/**
 * Returns true if card can beat currentBest in a single-card comparison.
 * @param {Card} card
 * @param {Card} currentBest
 * @param {string|null} trumpSuit
 * @param {number} [cardOrder=0]
 * @param {number} [bestOrder=0]
 * @returns {boolean}
 */
function canBeatSingle(card, currentBest, trumpSuit, cardOrder = 0, bestOrder = 0) {
    const cardIsTrump = isTrump(card, trumpSuit);
    const bestIsTrump = isTrump(currentBest, trumpSuit);
    if (cardIsTrump && !bestIsTrump) return true;
    if (!cardIsTrump && bestIsTrump) return false;
    return cardPower(card, trumpSuit, cardOrder) > cardPower(currentBest, trumpSuit, bestOrder);
}

// ---------------------------------------------------------------------------
// Chinese suit name map (for error messages)
// ---------------------------------------------------------------------------
const _SUIT_CN = {
    spades:   '黑桃',
    hearts:   '红心',
    clubs:    '梅花',
    diamonds: '方块',
    trump:    '主牌',
};

// ---------------------------------------------------------------------------
// Validation helpers (internal, but exported for game.js)
// ---------------------------------------------------------------------------

/**
 * Returns true if the player's hand contains a card that can beat the current best.
 * Exported because game.js uses it.
 * @param {Card[]} hand
 * @param {Card[]} currentBest
 * @param {Card[]} ledCards
 * @param {string|null} trumpSuit
 * @returns {boolean}
 */
function _canPlayerBeat(hand, currentBest, ledCards, trumpSuit) {
    const ledSuit = getFollowSuit(ledCards, trumpSuit);
    const handInSuit = filterHandBySuit(hand, ledSuit, trumpSuit);
    if (!currentBest || currentBest.length === 0) return false;
    const bestPower = Math.max(...currentBest.map(c => cardPower(c, trumpSuit, c.playOrder)));

    const ledType = getPlayType(ledCards, trumpSuit);

    if (ledType === PlayType.PAIR) {
        for (const pair of getPairs(handInSuit, trumpSuit)) {
            if (Math.max(cardPower(pair[0], trumpSuit, 0), cardPower(pair[1], trumpSuit, 0)) > bestPower) {
                return true;
            }
        }
        return false;
    }

    if (ledType === PlayType.TRIPLE) {
        for (const triple of getTriples(handInSuit, trumpSuit)) {
            if (Math.max(...triple.map(c => cardPower(c, trumpSuit, 0))) > bestPower) {
                return true;
            }
        }
        return false;
    }

    for (const card of handInSuit) {
        if (cardPower(card, trumpSuit, 0) > bestPower) return true;
    }
    return false;
}

/**
 * Returns true if followCards beats currentBest.
 * Renamed from _does_beat; exported because other modules use it.
 * @param {Card[]} followCards
 * @param {Card[]} currentBest
 * @param {string|null} trumpSuit
 * @returns {boolean}
 */
function doesBeat(followCards, currentBest, trumpSuit) {
    const followType = getPlayType(followCards, trumpSuit);
    if (followType === PlayType.BOMB) return true;
    if (!currentBest || currentBest.length === 0) return true;

    const bestType = getPlayType(currentBest, trumpSuit);

    // 连对/连三同张：只能被同类型同长度的连对压
    if (bestType === PlayType.CONSEC_PAIRS || bestType === PlayType.CONSEC_TRIPLES) {
        if (followType !== bestType) return false;
        if (followCards.length !== currentBest.length) return false;
        const followMin = Math.min(...followCards.map(c => cardPower(c, trumpSuit)));
        const bestMax   = Math.max(...currentBest.map(c => cardPower(c, trumpSuit)));
        return followMin > bestMax;
    }

    const followPower = Math.max(...followCards.map(c => cardPower(c, trumpSuit)));
    const bestPower   = Math.max(...currentBest.map(c => cardPower(c, trumpSuit)));

    const followTrump = followCards.some(c => isTrump(c, trumpSuit));
    const bestTrump   = currentBest.some(c => isTrump(c, trumpSuit));

    if (followTrump && !bestTrump) return true;
    if (!followTrump && bestTrump) return false;
    return followPower > bestPower;
}

// ---------------------------------------------------------------------------
// Main validation entry point
// ---------------------------------------------------------------------------

/**
 * Validates whether followCards is a legal play given the led cards, hand, etc.
 * Returns [isValid: boolean, errorMessage: string].
 * @param {Card[]} followCards
 * @param {Card[]} ledCards
 * @param {Card[]} hand
 * @param {string|null} trumpSuit
 * @param {boolean} trickHasScore
 * @param {Card[]|null} currentBest
 * @returns {[boolean, string]}
 */
function validateFollow(followCards, ledCards, hand, trumpSuit, trickHasScore, currentBest) {
    const ledType    = getPlayType(ledCards, trumpSuit);
    const followType = getPlayType(followCards, trumpSuit);
    const ledSuit    = getFollowSuit(ledCards, trumpSuit);
    const handInSuit = filterHandBySuit(hand, ledSuit, trumpSuit);
    const n = ledCards.length;

    // Bombs: 主牌炸弹 can beat any ≤4 cards; 副牌炸弹 can only beat same-suit ≤4 cards
    if (followType === PlayType.BOMB) {
        if (n > 4) return [false, '炸弹只能炸4张及以内的牌'];
        const bombCard = followCards[0];
        if (!isTrump(bombCard, trumpSuit)) {
            const bombSuit = getSuitOfCard(bombCard, trumpSuit);
            if (ledSuit !== bombSuit) {
                return [false, '副牌炸弹只能炸同花色的牌'];
            }
        }
        return [true, ''];
    }

    // Must play the correct number of cards
    if (followCards.length !== n) {
        if (hand.length < n) {
            if (followCards.length !== hand.length) return [false, `应出${hand.length}张（手牌不足）`];
        } else {
            return [false, `应出${n}张牌`];
        }
    }

    // Must follow suit if possible
    if (handInSuit.length > 0) {
        const followInSuit = followCards.filter(c => getSuitOfCard(c, trumpSuit) === ledSuit);
        const need = Math.min(n, handInSuit.length);
        if (followInSuit.length < need) {
            return [false, `必须跟${_SUIT_CN[ledSuit] ?? ledSuit}花色（手中还有${handInSuit.length}张）`];
        }
    }

    // 能压必压 rule (must beat if possible, when trick has score)
    if (trickHasScore && currentBest) {
        const canBeat = _canPlayerBeat(hand, currentBest, ledCards, trumpSuit);
        if (canBeat) {
            const isBeating = doesBeat(followCards, currentBest, trumpSuit);
            if (!isBeating) return [false, '前面有分牌，能压必压'];
            return [true, ''];
        }
    }

    // Rule: no voluntary score discard (不能主动垫分牌)
    const followScore = followCards.reduce((sum, c) => sum + c.scoreValue(), 0);
    if (followScore > 0) {
        const nonScoreInSuit = handInSuit.filter(c => c.scoreValue() === 0);
        if (nonScoreInSuit.length >= n) return [false, '不能主动垫分牌'];
        // 被迫垫分牌时：必须按分小牌小顺序（5分<10分，同分值按牌力小优先）
        if (nonScoreInSuit.length < n) {
            const scoreSorter = (a, b) =>
                a.scoreValue() - b.scoreValue() || cardPower(a, trumpSuit) - cardPower(b, trumpSuit);
            const scoreCardsInSuit = handInSuit.filter(c => c.scoreValue() > 0).sort(scoreSorter);
            const needScoreCount = n - nonScoreInSuit.length;
            const expectedScore = scoreCardsInSuit.slice(0, needScoreCount);
            const actualScore = followCards.filter(c => c.scoreValue() > 0).sort(scoreSorter);
            if (actualScore.length !== expectedScore.length ||
                actualScore.some((c, i) => c !== expectedScore[i])) {
                return [false, '垫分牌须按分小牌小顺序'];
            }
        }
    }

    return [true, ''];
}

// AI / game helpers
// ---------------------------------------------------------------------------

/**
 * Returns the recommended lead (pairs if available, otherwise biggest single).
 * @param {Card[]} hand
 * @param {string|null} trumpSuit
 * @returns {Card[]}
 */
function mustLeadPairOrBiggest(hand, trumpSuit) {
    const pairs = getPairs(hand, trumpSuit);
    if (pairs.length > 0) {
        const best = pairs.reduce((bestPair, p) =>
            cardPower(p[0], trumpSuit) > cardPower(bestPair[0], trumpSuit) ? p : bestPair
        );
        return [...best];
    }
    const biggest = hand.reduce((b, c) => cardPower(c, trumpSuit) > cardPower(b, trumpSuit) ? c : b);
    return [biggest];
}

/**
 * Returns padding cards to bring a play up to 4 cards (for bombs).
 * @param {Card[]} hand
 * @param {Card[]} originalPlay
 * @param {string|null} trumpSuit
 * @returns {Card[]}
 */
function getPadCards(hand, originalPlay, trumpSuit) {
    const nPad = 4 - originalPlay.length;
    if (nPad <= 0) return [];

    const available = hand.filter(c => !originalPlay.includes(c));

    // 按花色优先级筛选垫牌池
    const ledCard = originalPlay[0];
    let preferred, other;
    if (isTrump(ledCard, trumpSuit)) {
        preferred = available.filter(c => isTrump(c, trumpSuit));
    } else {
        preferred = available.filter(c => c.suit === ledCard.suit && !isTrump(c, trumpSuit));
    }
    other = available.filter(c => !preferred.includes(c));

    let pad = _pickPadFromPool(preferred, nPad, trumpSuit);
    if (pad.length < nPad) {
        pad = pad.concat(_pickPadFromPool(other, nPad - pad.length, trumpSuit));
    }
    return pad.slice(0, nPad);
}

function _pickPadFromPool(pool, n, trumpSuit) {
    if (!pool.length || n <= 0) return [];
    if (n >= 3) {
        const triples = getTriples(pool, trumpSuit);
        if (triples.length > 0) return triples[0].slice(0, 3);
    }
    if (n >= 2) {
        const pairs = getPairs(pool, trumpSuit);
        if (pairs.length > 0) {
            const pair = [...pairs[0]];
            if (n === 2) return pair;
            const remaining = pool.filter(c => !pair.includes(c));
            if (remaining.length > 0) return [...pair, remaining[0]];
            return pair;
        }
    }
    const sorted = [...pool].sort((a, b) => cardPower(a, trumpSuit) - cardPower(b, trumpSuit));
    return sorted.slice(0, n);
}

/**
 * game.js - 540打牌游戏状态与流程管理
 *
 * Translated from game_540/game.py (Python → ES module JS)
 */

    isTrump, cardPower, getPlayType, PlayType,
    canCallTrump, canCounterTrump,
    getFollowSuit, filterHandBySuit,
    getPairs, getTriples, getBombs,
    mustLeadPairOrBiggest, getPadCards,
    validateFollow, doesBeat, _canPlayerBeat,
} from './rules.js';

// ---------------------------------------------------------------------------
// 游戏阶段
// ---------------------------------------------------------------------------

/** @type {{ DEAL: string, CALL_TRUMP: string, PLAY: string, TRICK_END: string, GAME_END: string }} */
const Phase = Object.freeze({
    DEAL:       'deal',       // 发牌阶段
    CALL_TRUMP: 'call_trump', // 叫主阶段
    PLAY:       'play',       // 打牌阶段
    TRICK_END:  'trick_end',  // 本轮结束（短暂显示）
    GAME_END:   'game_end',   // 本局结束
});

// ---------------------------------------------------------------------------
// 玩家
// ---------------------------------------------------------------------------

class Player {
    /**
     * @param {string}  name
     * @param {boolean} [isHuman=false]
     */
    constructor(name, isHuman = false) {
        this.name       = name;
        this.isHuman    = isHuman;
        /** @type {Card[]} */
        this.hand       = [];
        this.trickScore = 0;    // 本局得分
        this.hasPlayed  = false; // 本局是否出过牌
    }

    /**
     * Removes the given card objects from the hand (by reference).
     * @param {Card[]} cards
     */
    removeCards(cards) {
        for (const c of cards) {
            const idx = this.hand.indexOf(c);
            if (idx !== -1) this.hand.splice(idx, 1);
        }
    }

    toString() {
        return `Player(${this.name})`;
    }
}

// ---------------------------------------------------------------------------
// 一轮（trick）记录
// ---------------------------------------------------------------------------

class TrickEntry {
    /**
     * @param {number} playerIdx
     * @param {Card[]} cards
     */
    constructor(playerIdx, cards) {
        this.playerIdx = playerIdx;
        this.cards     = cards;
    }

    /** @returns {number} */
    score() {
        return totalScore(this.cards);
    }
}

// ---------------------------------------------------------------------------
// 游戏状态
// ---------------------------------------------------------------------------

class GameState {
    constructor() {
        /** @type {Player[]} */
        this.players = [
            new Player('玩家1', false), // AI  (index 0, left)
            new Player('你',    true),  // 人类（index 1, bottom）
            new Player('玩家2', false), // AI  (index 2, top)
        ];

        /** @type {string|null} */
        this.trumpSuit       = null;  // 活主花色
        this.trumpCaller     = -1;    // 叫主玩家索引
        /** @type {Card[]} */
        this.trumpCallCards  = [];    // 叫主用的牌
        /** @type {TrickEntry[]} */
        this.currentTrick    = [];    // 当前轮出牌记录
        /** @type {string} */
        this.phase           = Phase.DEAL;
        this.firstPlayer     = 0;     // 本轮先出牌者
        this.trickWinner     = -1;    // 本轮赢家
        this.allTricksDone   = false;
        this.message         = '';    // 界面提示信息
        /** @type {string|null} */
        this.pendingAction   = null;  // AI待执行动作

        // 反主牌必出：反主成功后这些牌必须在第一次领出时打出
        /** @type {Card[]} */
        this.mustPlayCards   = [];

        // 叫主阶段状态
        this.callTrumpIdx    = 0;     // 当前正在决定是否叫主的玩家
        this.callTrumpDone   = false;

        // 打牌阶段：等待人类输入时置 true
        this.waitingHuman    = false;
        /** @type {Card[]|null} */
        this.humanSelected   = null;  // 人类选择的牌（由UI填入）

        // 被炸后垫牌状态
        this.bombPadNeeded   = false;
        this.bombPadPlayer   = -1;
        this.bombPadCount    = 0;

        // 初始化：发牌（随机决定叫主起始玩家）
        this._deal(Math.floor(Math.random() * 3));
    }

    // ------------------------------------------------------------------
    // 发牌
    // ------------------------------------------------------------------

    /**
     * Deals a fresh game. Resets all per-game state.
     * @param {number} [startFrom=-1]  Index of the player who calls trump first;
     *                                  if negative, chosen randomly.
     */
    _deal(startFrom = -1) {
        if (startFrom < 0) startFrom = Math.floor(Math.random() * 3);

        const deck  = buildDeck();
        const hands = shuffleAndDeal(deck);

        for (let i = 0; i < this.players.length; i++) {
            this.players[i].hand       = [...hands[i]];
            this.players[i].trickScore = 0;
            this.players[i].hasPlayed  = false;
        }

        this.phase          = Phase.CALL_TRUMP;
        this.callTrumpIdx   = startFrom;
        this.callTrumpCount = 0;         // 已决定的玩家数
        this.trumpSuit      = null;
        this.trumpCaller    = -1;
        this.trumpCallCards = [];
        this.mustPlayCards  = [];
        this.callTrumpDone  = false;
        this.currentTrick   = [];
        this.trickWinner    = -1;
        this.allTricksDone  = false;
        this.message        = '叫主阶段：请各玩家决定是否叫主';
    }

    // ------------------------------------------------------------------
    // 叫主阶段
    // ------------------------------------------------------------------

    /**
     * Preemptive trump-calling: any player may call/counter at any time.
     * callCards === null means this player passes.
     * Returns true if the action succeeded (pass always succeeds; invalid call returns false).
     * @param {number}      playerIdx
     * @param {Card[]|null} callCards
     * @returns {boolean}
     */
    processCallTrump(playerIdx, callCards) {
        if (callCards === null) return true;

        if (this.trumpCaller === -1) {
            if (canCallTrump(callCards)) {
                this.trumpCaller    = playerIdx;
                this.trumpCallCards = callCards;
                this.mustPlayCards  = [...callCards];
                this.trumpSuit      = this._extractTrumpSuit(callCards);
                this.message        = `${this.players[playerIdx].name} 叫主`;
                return true;
            }
            return false;
        } else {
            if (canCounterTrump(callCards, this.trumpCallCards)) {
                this.trumpCaller    = playerIdx;
                this.trumpCallCards = callCards;
                this.mustPlayCards  = [...callCards];
                this.trumpSuit      = this._extractTrumpSuit(callCards);
                this.message        = `${this.players[playerIdx].name} 反主`;
                return true;
            }
            return false;
        }
    }

    /**
     * Closes the trump-calling window and advances to the play phase.
     */
    finishCallTrump() {
        this._finishCallTrump();
    }

    /**
     * Extracts the active trump suit from calling cards.
     * Returns null when calling with specials (jokers, character, 3).
     * @param {Card[]} cards
     * @returns {string|null}
     */
    _extractTrumpSuit(cards) {
        for (const c of cards) {
            if (c.suit !== 'special' && c.rank === '10') return c.suit;
        }
        return null; // 叫的是王/字牌/3，无活主花色
    }

    /** @private */
    _finishCallTrump() {
        this.callTrumpDone = true;
        this.phase         = Phase.PLAY;
        // 先出牌者：叫主者（若无人叫主则叫主起始玩家）
        this.firstPlayer   = Math.max(this.trumpCaller, 0);
        this._startTrick(this.firstPlayer);

        const suitCn = { spades: '黑桃', hearts: '红心', clubs: '梅花', diamonds: '方块' };
        if (this.trumpSuit) {
            const ts = suitCn[this.trumpSuit] ?? this.trumpSuit;
            this.message = `活主：${ts}，${this.players[this.trumpCaller].name}先出牌`;
        } else {
            const firstName = this.players[this.firstPlayer].name;
            this.message = `常主模式，${firstName}先出牌`;
        }
    }

    // ------------------------------------------------------------------
    // 打牌阶段
    // ------------------------------------------------------------------

    /**
     * Starts a new trick with the given first player.
     * @param {number} firstPlayer
     * @private
     */
    _startTrick(firstPlayer) {
        this.currentTrick = [];
        this.firstPlayer  = firstPlayer;
        this.trickWinner  = -1;
        this.message      = `${this.players[firstPlayer].name} 先出牌`;
    }

    /**
     * Returns the index of the player who should play next this trick.
     * Returns -1 when the trick is already complete.
     * @returns {number}
     */
    whoLeads() {
        if (this.currentTrick.length === 0) return this.firstPlayer;

        // Follow order: players after firstPlayer in cyclic order
        const played = new Set(this.currentTrick.map(e => e.playerIdx));
        for (let offset = 1; offset <= 2; offset++) {
            const idx = (this.firstPlayer + offset) % 3;
            if (!played.has(idx)) return idx;
        }
        return -1; // 本轮已结束
    }

    /** @returns {boolean} */
    isTrickComplete() {
        return this.currentTrick.length === 3;
    }

    /** @returns {boolean} */
    trickHasScore() {
        return this.currentTrick.some(e => e.score() > 0);
    }

    /**
     * Returns the currently winning cards in this trick, or null if no cards played.
     * @returns {Card[]|null}
     */
    getCurrentBest() {
        if (this.currentTrick.length === 0) return null;
        let bestEntry = this.currentTrick[0];
        for (const entry of this.currentTrick.slice(1)) {
            if (doesBeat(entry.cards, bestEntry.cards, this.trumpSuit)) {
                bestEntry = entry;
            }
        }
        return bestEntry.cards;
    }

    /**
     * Returns the cards that were led (first played) this trick, or null.
     * @returns {Card[]|null}
     */
    getLedCards() {
        if (this.currentTrick.length > 0) return this.currentTrick[0].cards;
        return null;
    }

    /**
     * Attempts to play cards for a player.
     * Returns [success: boolean, errorMessage: string].
     * @param {number}   playerIdx
     * @param {Card[]}   cards
     * @param {boolean}  [skipValidation=false]
     * @returns {[boolean, string]}
     */
    playCards(playerIdx, cards, skipValidation = false) {
        const player = this.players[playerIdx];

        // Verify every card is in the player's hand (by reference)
        for (const c of cards) {
            if (!player.hand.includes(c)) return [false, `手中没有这张牌: ${c}`];
        }

        // Leading (first card of the trick)
        if (this.currentTrick.length === 0) {
            const playType = getPlayType(cards, this.trumpSuit);
            if (playType === PlayType.INVALID) return [false, '无效出牌'];

            // 反主牌必出规则：反主的牌必须在领出时打出
            if (this.mustPlayCards.length > 0 && playerIdx === this.trumpCaller && !skipValidation) {
                for (const mc of this.mustPlayCards) {
                    if (!cards.includes(mc)) {
                        return [false, '必须出反主的牌'];
                    }
                }
                this.mustPlayCards = [];
            }

            // First-play rule: if any other player hasn't played yet, must lead a pair
            // (or the biggest single if no pairs exist)
            const anyUnplayed = this.players.some(
                (p, i) => i !== playerIdx && !p.hasPlayed
            );
            if (anyUnplayed && !skipValidation) {
                const pairs = getPairs(player.hand, this.trumpSuit);
                if (pairs.length > 0) {
                    // Must play a pair-based type
                    const pairTypes = [
                        PlayType.PAIR, PlayType.CONSEC_PAIRS,
                        PlayType.TRIPLE, PlayType.CONSEC_TRIPLES,
                        PlayType.BOMB,
                    ];
                    if (!pairTypes.includes(playType)) {
                        return [false, '有玩家未出过牌，必须出对子（或连对等）'];
                    }
                } else {
                    // No pairs — must play the biggest single
                    if (playType !== PlayType.SINGLE) return [false, '无对子时必须出单张'];
                    const best = player.hand.reduce((b, c) =>
                        cardPower(c, this.trumpSuit) > cardPower(b, this.trumpSuit) ? c : b
                    );
                    if (cards[0] !== best) return [false, `必须出最大单张: ${best}`];
                }
            }

            // Tag play order on the cards
            cards.forEach((c, i) => { c.playOrder = i; });

            this.currentTrick.push(new TrickEntry(playerIdx, cards));
            player.removeCards(cards);
            player.hasPlayed = true;
            return [true, ''];

        } else {
            // Following
            const ledCards    = this.getLedCards();
            const currentBest = this.getCurrentBest();
            const hasScore    = this.trickHasScore();

            if (!skipValidation) {
                const [ok, err] = validateFollow(
                    cards, ledCards, player.hand,
                    this.trumpSuit, hasScore, currentBest ?? []
                );
                if (!ok) return [false, err];
            }

            cards.forEach((c, i) => { c.playOrder = this.currentTrick.length * 10 + i; });

            this.currentTrick.push(new TrickEntry(playerIdx, cards));
            player.removeCards(cards);
            player.hasPlayed = true;
            return [true, ''];
        }
    }

    /**
     * Resolves the current trick: determines the winner and awards score.
     * Returns the winner's player index, or -1 if the trick is not yet complete.
     * @returns {number}
     */
    resolveTrick() {
        if (!this.isTrickComplete()) return -1;

        let bestEntry = this.currentTrick[0];
        for (const entry of this.currentTrick.slice(1)) {
            if (doesBeat(entry.cards, bestEntry.cards, this.trumpSuit)) {
                bestEntry = entry;
            }
        }

        const winner     = bestEntry.playerIdx;
        const trickScore = this.currentTrick.reduce((sum, e) => sum + e.score(), 0);
        this.players[winner].trickScore += trickScore;
        this.trickWinner = winner;

        // Note: bomb-after-bomb padding (炸弹垫牌) is handled by the UI layer.

        return winner;
    }

    /**
     * Clears the current trick and starts a new one led by the previous winner.
     * Sets allTricksDone + phase = GAME_END when all hands are empty.
     */
    startNextTrick() {
        const winner      = this.trickWinner;
        this.currentTrick = [];
        this._startTrick(winner);

        if (this.players.every(p => p.hand.length === 0)) {
            this.allTricksDone = true;
            this.phase         = Phase.GAME_END;
        }
    }

    /**
     * Returns the delta score for each player relative to the 180-point baseline.
     * Positive = won that many points; negative = lost that many.
     * @returns {number[]} [delta0, delta1, delta2]
     */
    calculateFinalScores() {
        const baseline = 180;
        return this.players.map(p => p.trickScore - baseline);
    }

    /**
     * Resets the game (re-deals). The winner of the last complete game leads
     * the trump-calling phase; otherwise a random player is chosen.
     */
    reset() {
        let startFrom;
        if (this.allTricksDone) {
            startFrom = this.players.reduce(
                (bestIdx, p, i) => p.trickScore > this.players[bestIdx].trickScore ? i : bestIdx,
                0
            );
        } else {
            startFrom = Math.floor(Math.random() * 3);
        }
        this._deal(startFrom);
    }
}

// ---------------------------------------------------------------------------
// 叫主 AI
// ---------------------------------------------------------------------------

/**
 * AI决定是否叫主/反主。
 * 返回叫主用的牌列表，或 null（Pass）。
 * @param {Card[]} hand
 * @param {Card[]|null} currentCall
 * @returns {Card[]|null}
 */
function aiDecideCallTrump(hand, currentCall) {
    const candidates = _findCallCandidates(hand);
    if (!candidates.length) return null;

    // 按叫主强度排序（张数多优先，然后点数大优先）
    candidates.sort((a, b) => {
        const lenDiff = b.length - a.length;
        if (lenDiff !== 0) return lenDiff;
        return _callPower(b) - _callPower(a);
    });

    for (const callCards of candidates) {
        if (currentCall === null || currentCall === undefined) {
            if (canCallTrump(callCards)) return callCards;
        } else {
            if (canCounterTrump(callCards, currentCall)) return callCards;
        }
    }

    return null;
}

/**
 * 找出所有可以用于叫主的牌组合
 * @param {Card[]} hand
 * @returns {Card[][]}
 */
function _findCallCandidates(hand) {
    const candidates = [];
    const groups = {};
    for (const c of hand) {
        if (!groups[c.rank]) groups[c.rank] = [];
        groups[c.rank].push(c);
    }

    for (const [rank, cards] of Object.entries(groups)) {
        if (rank === '10') {
            // 10必须按花色分组，不同花色不能混用
            const suitGroups = {};
            for (const c of cards) {
                if (!suitGroups[c.suit]) suitGroups[c.suit] = [];
                suitGroups[c.suit].push(c);
            }
            for (const suitCards of Object.values(suitGroups)) {
                if (suitCards.length >= 1) candidates.push([suitCards[0]]);
                if (suitCards.length >= 2) candidates.push(suitCards.slice(0, 2));
                if (suitCards.length >= 3) candidates.push(suitCards.slice(0, 3));
                if (suitCards.length >= 4) candidates.push(suitCards.slice(0, 4));
            }
        } else if ([RANK_SMALL_JOKER, RANK_BIG_JOKER, RANK_CHARACTER, RANK_THREE].includes(rank)) {
            if (cards.length >= 2) candidates.push(cards.slice(0, 2));
            if (cards.length >= 3) candidates.push(cards.slice(0, 3));
            if (cards.length >= 4) candidates.push(cards.slice(0, 4));
        }
    }

    return candidates;
}

/**
 * 叫主强度（排序用）
 * @param {Card[]} cards
 * @returns {number}
 */
function _callPower(cards) {
    const rank = cards[0].rank;
    const rankPower = {
        '10': 1,
        [RANK_SMALL_JOKER]: 2,
        [RANK_BIG_JOKER]: 3,
        [RANK_CHARACTER]: 4,
        [RANK_THREE]: 5,
    };
    return rankPower[rank] ?? 0;
}

// ---------------------------------------------------------------------------
// 出牌 AI（领出）
// ---------------------------------------------------------------------------

/**
 * AI领出牌决策。
 * @param {Card[]} hand
 * @param {string|null} trumpSuit
 * @param {boolean} anyUnplayed - 是否有玩家未出过牌（影响必须出对子规则）
 * @returns {Card[]}
 */
function aiLead(hand, trumpSuit, anyUnplayed, mustPlayCards = null) {
    // 反主牌必出：直接出这些牌
    if (mustPlayCards && mustPlayCards.length > 0) {
        return [...mustPlayCards];
    }

    if (anyUnplayed) {
        // 有玩家未出过牌：必须出对子（或无对子时最大单张）
        const pairs = getPairs(hand, trumpSuit);
        if (pairs.length) {
            // 优先出非主牌的分值对子，次选主牌对子
            const nonTrumpScorePairs = pairs.filter(
                p => !isTrump(p[0], trumpSuit) && p[0].scoreValue() > 0
            );
            if (nonTrumpScorePairs.length) {
                const best = nonTrumpScorePairs.reduce((a, b) =>
                    cardPower(a[0], trumpSuit) > cardPower(b[0], trumpSuit) ? a : b
                );
                return [...best];
            }
            // 无分值对子，出最小对子
            const best = pairs.reduce((a, b) =>
                cardPower(a[0], trumpSuit) < cardPower(b[0], trumpSuit) ? a : b
            );
            return [...best];
        } else {
            // 无对子，出最大单张
            return [hand.reduce((a, b) =>
                cardPower(a, trumpSuit) > cardPower(b, trumpSuit) ? a : b
            )];
        }
    }

    // 所有玩家都出过牌，可自由出
    // 策略：优先出连对（带分），其次出对子，最后出单张
    const consec = _findBestConsecutivePairs(hand, trumpSuit);
    if (consec) return consec;

    const pairs = getPairs(hand, trumpSuit);
    if (pairs.length) {
        // 出最有价值的对子（非分牌配对）
        const scoredPairs = pairs.filter(p => p[0].scoreValue() > 0 || p[1].scoreValue() > 0);
        let best;
        if (scoredPairs.length) {
            best = scoredPairs.reduce((a, b) =>
                cardPower(a[0], trumpSuit) > cardPower(b[0], trumpSuit) ? a : b
            );
        } else {
            // 出最大对子（进攻）
            best = pairs.reduce((a, b) =>
                cardPower(a[0], trumpSuit) > cardPower(b[0], trumpSuit) ? a : b
            );
        }
        return [...best];
    }

    // 无对子：出最大非分单张，或最大单张
    const nonScore = hand.filter(c => c.scoreValue() === 0);
    if (nonScore.length) {
        return [nonScore.reduce((a, b) =>
            cardPower(a, trumpSuit) > cardPower(b, trumpSuit) ? a : b
        )];
    }
    return [hand.reduce((a, b) =>
        cardPower(a, trumpSuit) > cardPower(b, trumpSuit) ? a : b
    )];
}

/**
 * 寻找手牌中最长的连对
 * @param {Card[]} hand
 * @param {string|null} trumpSuit
 * @returns {Card[]|null}
 */
function _findBestConsecutivePairs(hand, trumpSuit) {
    const groups = {};
    for (const c of hand) {
        const key = pairKey(c, trumpSuit);
        if (!groups[key]) groups[key] = [];
        groups[key].push(c);
    }

    // 找所有成对的组
    const pairGroups = Object.entries(groups).filter(([k, g]) => g.length >= 2);
    if (pairGroups.length < 2) return null;

    // 找连续的对子序列
    const pairWithOrder = [];
    for (const [k, g] of pairGroups) {
        const order = trumpPairOrder([g[0], g[1]], trumpSuit);
        if (order > 0) {
            pairWithOrder.push([order, g.slice(0, 2)]);
        }
    }

    if (!pairWithOrder.length) return null;

    pairWithOrder.sort((a, b) => a[0] - b[0]);

    // 找最长连续段
    let bestSeq = [];
    let currentSeq = [pairWithOrder[0]];
    for (let i = 1; i < pairWithOrder.length; i++) {
        if (pairWithOrder[i][0] - pairWithOrder[i - 1][0] === 1) {
            currentSeq.push(pairWithOrder[i]);
        } else {
            if (currentSeq.length > bestSeq.length) bestSeq = currentSeq;
            currentSeq = [pairWithOrder[i]];
        }
    }
    if (currentSeq.length > bestSeq.length) bestSeq = currentSeq;

    if (bestSeq.length >= 2) {
        const result = [];
        for (const [, pair] of bestSeq) result.push(...pair);
        return result;
    }
    return null;
}

// ---------------------------------------------------------------------------
// 跟牌 AI
// ---------------------------------------------------------------------------

/**
 * AI跟牌决策。
 * @param {Card[]} hand
 * @param {Card[]} ledCards
 * @param {Card[]} currentBest
 * @param {string|null} trumpSuit
 * @param {boolean} trickHasScore
 * @returns {Card[]}
 */
function aiFollow(hand, ledCards, currentBest, trumpSuit, trickHasScore) {
    const n = ledCards.length;
    const ledSuit = getFollowSuit(ledCards, trumpSuit);
    const handInSuit = filterHandBySuit(hand, ledSuit, trumpSuit);

    // 可用牌：优先用本花色牌（计算用，实际分支内处理）
    const available = handInSuit.length ? handInSuit : hand;

    const playType = getPlayType(ledCards, trumpSuit);

    // 如果是对子/连对，尝试出对应牌型
    if (playType === PlayType.PAIR || playType === PlayType.CONSEC_PAIRS) {
        return _followPairs(hand, ledCards, currentBest, trumpSuit, trickHasScore, n);
    }

    if (playType === PlayType.TRIPLE) {
        return _followNSame(hand, ledCards, currentBest, trumpSuit, trickHasScore, n, 3);
    }

    if (playType === PlayType.BOMB) {
        // 出炸弹：也可以用炸弹压
        const bombs = getBombs(hand, trumpSuit);
        if (bombs.length) {
            // 找能压的最小炸弹
            const sortedBombs = [...bombs].sort((a, b) =>
                cardPower(a[0], trumpSuit) - cardPower(b[0], trumpSuit)
            );
            for (const bomb of sortedBombs) {
                if (doesBeat(bomb, currentBest, trumpSuit)) return bomb;
            }
        }
        // 无法压：垫最小的4张
        return _pickDiscard(hand, 4, trumpSuit);
    }

    // 单张
    return _followSingle(hand, ledCards, currentBest, trumpSuit, trickHasScore);
}

/**
 * 跟单张牌
 * @param {Card[]} hand
 * @param {Card[]} ledCards
 * @param {Card[]} currentBest
 * @param {string|null} trumpSuit
 * @param {boolean} trickHasScore
 * @returns {Card[]}
 */
function _followSingle(hand, ledCards, currentBest, trumpSuit, trickHasScore) {
    const ledSuit = getFollowSuit(ledCards, trumpSuit);
    const handInSuit = filterHandBySuit(hand, ledSuit, trumpSuit);

    if (handInSuit.length) {
        if (trickHasScore) {
            // 能压必压：找最小的能压的牌
            const canBeatCards = handInSuit.filter(c => doesBeat([c], currentBest, trumpSuit));
            if (canBeatCards.length) {
                return [canBeatCards.reduce((a, b) =>
                    cardPower(a, trumpSuit) < cardPower(b, trumpSuit) ? a : b
                )];
            }
        }
        // 垫牌：出最小（优先非分牌）
        return [_pickSmallestCard(handInSuit, trumpSuit)];
    } else {
        // 无该花色：可用主牌压，或垫牌
        if (trickHasScore) {
            const trumpInHand = hand.filter(c => isTrump(c, trumpSuit));
            const canBeat = trumpInHand.filter(c => doesBeat([c], currentBest, trumpSuit));
            if (canBeat.length) {
                return [canBeat.reduce((a, b) =>
                    cardPower(a, trumpSuit) < cardPower(b, trumpSuit) ? a : b
                )];
            }
        }
        // 垫牌
        return [_pickSmallestCard(hand, trumpSuit)];
    }
}

/**
 * 跟对子/连对
 * @param {Card[]} hand
 * @param {Card[]} ledCards
 * @param {Card[]} currentBest
 * @param {string|null} trumpSuit
 * @param {boolean} trickHasScore
 * @param {number} n
 * @returns {Card[]}
 */
function _followPairs(hand, ledCards, currentBest, trumpSuit, trickHasScore, n) {
    const ledSuit = getFollowSuit(ledCards, trumpSuit);
    const handInSuit = filterHandBySuit(hand, ledSuit, trumpSuit);
    const pairsInSuit = getPairs(handInSuit, trumpSuit);

    const numPairsNeeded = Math.floor(n / 2);

    if (pairsInSuit.length >= numPairsNeeded) {
        // 有足够对子
        if (trickHasScore) {
            // 尝试压牌
            const canBeat = pairsInSuit.filter(p =>
                doesBeat([...p], currentBest.slice(0, 2), trumpSuit)
            );
            if (canBeat.length) {
                // 用最小能压的对子
                const bestPair = canBeat.reduce((a, b) =>
                    cardPower(a[0], trumpSuit) < cardPower(b[0], trumpSuit) ? a : b
                );
                return [...bestPair];
            }
        }
        // 垫最小对子
        const smallest = pairsInSuit.reduce((a, b) =>
            cardPower(a[0], trumpSuit) < cardPower(b[0], trumpSuit) ? a : b
        );
        return [...smallest];
    } else {
        // 对子不足，能出几对就出几对，剩余用单张补
        const result = [];
        const usedCards = new Set();
        for (const pair of pairsInSuit) {
            result.push(...pair);
            for (const c of pair) usedCards.add(c);
        }
        const remainingNeeded = n - result.length;
        const fillers = (handInSuit.length ? handInSuit : hand)
            .filter(c => !usedCards.has(c))
            .slice(0, remainingNeeded);
        result.push(...fillers);
        if (result.length < n) {
            const more = hand
                .filter(c => !result.includes(c))
                .slice(0, n - result.length);
            result.push(...more);
        }
        return result.slice(0, n);
    }
}

/**
 * 跟3同张
 * @param {Card[]} hand
 * @param {Card[]} ledCards
 * @param {Card[]} currentBest
 * @param {string|null} trumpSuit
 * @param {boolean} trickHasScore
 * @param {number} n
 * @param {number} sameCount
 * @returns {Card[]}
 */
function _followNSame(hand, ledCards, currentBest, trumpSuit, trickHasScore, n, sameCount) {
    const ledSuit = getFollowSuit(ledCards, trumpSuit);
    const handInSuit = filterHandBySuit(hand, ledSuit, trumpSuit);
    const triples = getTriples(handInSuit, trumpSuit);

    if (triples.length) {
        if (trickHasScore) {
            const canBeat = triples.filter(t => doesBeat(t, currentBest, trumpSuit));
            if (canBeat.length) {
                return canBeat.reduce((a, b) =>
                    cardPower(a[0], trumpSuit) < cardPower(b[0], trumpSuit) ? a : b
                );
            }
        }
        return triples.reduce((a, b) =>
            cardPower(a[0], trumpSuit) < cardPower(b[0], trumpSuit) ? a : b
        );
    }

    // 无3同张：用对子+单张或3单张
    return _pickDiscard(handInSuit.length ? handInSuit : hand, n, trumpSuit);
}

/**
 * 选最小的牌（优先非分牌）
 * @param {Card[]} cards
 * @param {string|null} trumpSuit
 * @returns {Card}
 */
function _pickSmallestCard(cards, trumpSuit) {
    const nonScore = cards.filter(c => c.scoreValue() === 0);
    const pool = nonScore.length ? nonScore : cards;
    return pool.reduce((a, b) =>
        cardPower(a, trumpSuit) < cardPower(b, trumpSuit) ? a : b
    );
}

/**
 * 选n张垫牌（不能主动垫分牌）。
 * 优先垫最小非分牌，不足时才垫分牌（按分小牌小顺序）。
 * @param {Card[]} hand
 * @param {number} n
 * @param {string|null} trumpSuit
 * @returns {Card[]}
 */
function _pickDiscard(hand, n, trumpSuit) {
    // 先取非分牌（按分值0，再按牌力升序）
    const nonScore = [...hand]
        .sort((a, b) => (a.scoreValue() - b.scoreValue()) || (cardPower(a, trumpSuit) - cardPower(b, trumpSuit)))
        .filter(c => c.scoreValue() === 0)
        .slice(0, n);

    const result = nonScore;
    if (result.length < n) {
        // 不足则补分牌（按分值从小到大）
        const scoreCards = hand
            .filter(c => c.scoreValue() > 0)
            .sort((a, b) => (a.scoreValue() - b.scoreValue()) || (cardPower(a, trumpSuit) - cardPower(b, trumpSuit)));
        result.push(...scoreCards.slice(0, n - result.length));
    }
    return result.slice(0, n);
}
